spring.application.name=dlq-audit-service
server.port=8081

# ── Banco de dados H2 em memória ─────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:dlqauditdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Console H2: http://localhost:8081/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ── AWS SQS ───────────────────────────────────────────────────────────────────
spring.cloud.aws.region.static=sa-east-1
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY}

# Nome da fila DLQ que este serviço escuta
dlq.queue.name=T02N-MIRIELEN_GOULART-DLQ.fifo

# ── Configurações de auditoria ────────────────────────────────────────────────
# Valor fixo que será gravado na coluna queue_name de todos os registros
app.audit.original-queue-name=SQS_QUEUE

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.audit.dlq=DEBUG
logging.level.io.awspring.cloud=INFO
